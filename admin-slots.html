<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Admin | La Primavera</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body { background-color: #2C1810; font-family: 'Poppins', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .admin-card { background: white; padding: 40px; border-radius: 25px; width: 100%; max-width: 400px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); text-align: center; }
        .admin-card h2 { font-family: 'Cinzel', serif; color: #B8860B; margin-bottom: 25px; }
        
        .password-container { position: relative; margin-bottom: 20px; }
        .form-control { border-radius: 10px; padding: 12px; border: 1px solid #ddd; width: 100%; }
        
        .toggle-password {
            position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
            cursor: pointer; color: #666; font-size: 1.2rem; z-index: 10;
        }

        .btn-admin { background: #2C1810; color: white; border: none; border-radius: 50px; padding: 12px; width: 100%; font-weight: bold; transition: 0.3s; cursor: pointer; }
        .btn-admin:hover { background: #B8860B; }
        
        .admin-footer { margin-top: 20px; font-size: 0.85rem; }
        .admin-link { color: #B8860B; text-decoration: none; display: block; margin-bottom: 10px; font-weight: 600; cursor: pointer; }
        
        #msg { padding: 10px; border-radius: 8px; margin-top: 15px; font-size: 0.9rem; display: none; }
        .error { background: #f8d7da; color: #721c24; }
        .success { background: #d4edda; color: #155724; }
    </style>
</head>
<body>

<div class="admin-card">
    <h2>ADMIN ACCESS</h2>
    <form id="adminLoginForm">
        <input type="email" id="adm-email" class="form-control mb-3" placeholder="Email Administrateur" required>
        
        <div class="password-container">
            <input type="password" id="adm-pass" class="form-control" placeholder="Mot de passe" required>
            <i class="bi bi-eye toggle-password" onclick="toggleVisibility('adm-pass', this)"></i>
        </div>

        <button type="submit" class="btn-admin" id="btn-text">ENTRER</button>
    </form>
    
    <div class="admin-footer">
        <a href="javascript:void(0)" class="admin-link" onclick="recoverPassword()">Mot de passe oublié ?</a>
        <a href="admin-signup.html" class="admin-link">Créer um novo admin</a>
    </div>

    <div id="msg"></div>
</div>

<script>
    const _supabase = supabase.createClient('https://eqgpkdbdsfbtyisfkfsx.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVxZ3BrZGJkc2ZidHlpc2ZrZnN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMzg5NjAsImV4cCI6MjA4OTgxNDk2MH0.XOiRUOt_5wwX5AcoVQX_VWL9lkNJWjA4k5-p4eEBYbg');

    function toggleVisibility(inputId, icon) {
        const input = document.getElementById(inputId);
        if (input.type === "password") {
            input.type = "text";
            icon.classList.replace("bi-eye", "bi-eye-slash");
        } else {
            input.type = "password";
            icon.classList.replace("bi-eye-slash", "bi-eye");
        }
    }

    document.getElementById('adminLoginForm').onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('adm-email').value;
        const password = document.getElementById('adm-pass').value;
        const msg = document.getElementById('msg');
        const btn = document.getElementById('btn-text');

        btn.innerText = "Vérification...";
        btn.disabled = true;

        try {
            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
            if (error) throw new Error("Email ou mot de passe incorrect.");

            const { data: profile } = await _supabase.from('profiles').select('is_admin').eq('id', data.user.id).maybeSingle();

            if (profile && profile.is_admin === true) {
                // AQUI ESTÁ A CORREÇÃO: Redireciona para admin.html
                window.location.href = "admin.html";
            } else {
                await _supabase.auth.signOut();
                throw new Error("Accès refusé : Réservé aux administrateurs.");
            }
        } catch (err) {
            msg.innerText = err.message;
            msg.className = "error";
            msg.style.display = 'block';
            btn.innerText = "ENTRER";
            btn.disabled = false;
        }
    };

    async function recoverPassword() {
        const email = document.getElementById('adm-email').value;
        if (!email) return alert("Veuillez saisir votre e-mail pour la récupération.");
        
        const { error } = await _supabase.auth.resetPasswordForEmail(email);
        const msg = document.getElementById('msg');
        if (error) {
            msg.innerText = "Erreur: " + error.message;
            msg.className = "error";
        } else {
            msg.innerText = "Email de récupération envoyé !";
            msg.className = "success";
        }
        msg.style.display = 'block';
    }
</script>
</body>
</html>
