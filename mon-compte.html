<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Compte | La Primavera</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        :root { --dark: #4A2419; --rose: #C98986; --bg: #fdfaf8; --gold: #B8860B; --cafe: #2C1810; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg); color: var(--dark); padding-top: 90px; }

        .navbar { background: white !important; border-bottom: 2px solid var(--gold); padding: 12px 50px; position: fixed; top: 0; width: 100%; z-index: 1000; }
        .navbar-brand { font-family: 'Cinzel', serif; font-weight: 700; color: var(--cafe) !important; letter-spacing: 2px; text-decoration: none; }

        .user-dropdown .btn-user { 
            border: none; background: none; color: var(--cafe); 
            display: flex; align-items: center; gap: 10px; 
            font-weight: 700; font-family: 'Cinzel', serif; font-size: 0.85rem; text-decoration: none;
        }
        .user-icon { font-size: 1.6rem; color: var(--cafe); }

        .main-container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .profile-card { background: white; border-radius: 25px; padding: 35px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #eee; margin-bottom: 30px; height: 100%; }
        .section-title { font-family: 'Cinzel', serif; font-weight: 700; color: var(--gold); margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 10px; }

        .form-label { font-weight: 600; font-size: 0.8rem; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        .form-control { border-radius: 10px; padding: 12px; border: 1px solid #eee; background: #fafafa; margin-bottom: 15px; font-size: 0.9rem; }
        .form-control:disabled { background: #f4f4f4; color: #999; border-color: #eee; cursor: not-allowed; }
        
        .btn-update { background: var(--dark); color: white; border: none; border-radius: 50px; padding: 12px; font-weight: 600; width: 100%; transition: 0.3s; }
        .btn-update:hover { background: var(--rose); transform: translateY(-2px); }

        .btn-edit { background: var(--gold); color: white; border: none; border-radius: 50px; padding: 10px; width: 100%; font-weight: 600; font-size: 0.85rem; transition: 0.3s; margin-bottom: 15px; }
        
        .btn-outline-gold { border: 2px solid var(--gold); color: var(--gold); background: transparent; border-radius: 50px; padding: 10px; width: 100%; font-weight: 600; font-size: 0.85rem; transition: 0.3s; }
        .btn-outline-gold:hover { background: var(--gold); color: white; }

        .order-card { background: #fafafa; border-radius: 15px; padding: 20px; margin-bottom: 15px; border-left: 5px solid var(--rose); position: relative; }
        .badge-status { font-size: 0.75rem; padding: 4px 12px; border-radius: 50px; font-weight: 600; }
        
        .loader-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; display: flex; align-items: center; justify-content: center; }

        #printableReceipt { font-family: 'Poppins', sans-serif; display: block; padding: 10px; width: 100%; background: white; }
        .receipt-header { text-align: center; border-bottom: 2px solid var(--gold); padding-bottom: 10px; margin-bottom: 20px; }
        .receipt-logo { width: 60px; margin-bottom: 10px; border-radius: 50%; }
        .receipt-table { width: 100%; font-size: 0.85rem; border-collapse: collapse; }
        .receipt-table th { text-align: left; border-bottom: 1px solid #eee; padding: 5px; color: var(--gold); }
        .receipt-table td { padding: 8px 5px; border-bottom: 1px solid #f9f9f9; }
        .receipt-total-box { border-top: 2px dashed #eee; margin-top: 15px; padding-top: 10px; text-align: right; }
        
        @media print {
            body * { visibility: hidden; }
            #printableReceipt, #printableReceipt * { visibility: visible; }
            #printableReceipt { display: block !important; position: absolute; left: 0; top: 0; width: 100%; border: none; }
            .no-print { display: none !important; }
        }

        #chat-box::-webkit-scrollbar { width: 6px; }
        #chat-box::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        .lang-select { border: 1px solid #eee; border-radius: 20px; padding: 2px 10px; font-size: 0.8rem; outline: none; cursor: pointer; }
    </style>
</head>
<body>

<div id="loader" class="loader-overlay"><div class="spinner-border" style="color: var(--dark);"></div></div>

<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand" href="index.html">LA PRIMAVERA</a>
        <div class="d-flex align-items-center">
            <select class="lang-select me-3" onchange="changeLanguage(this.value)">
                <option value="fr">FR 🇫🇷</option>
                <option value="en">EN 🇺🇸</option>
                <option value="es">ES 🇪🇸</option>
            </select>
            <a href="index.html" class="btn btn-outline-dark btn-sm rounded-pill px-3 me-3" data-i18n="nav_home">Accueil</a>
            <div id="auth-area"></div>
        </div>
    </div>
</nav>

<div class="main-container">
    <div class="row">
        <div class="col-lg-5">
            <div class="profile-card shadow-sm">
                <h3 class="section-title"><i class="bi bi-person-circle me-2"></i> <span data-i18n="profile_title">Mon Profil</span></h3>
                <button type="button" class="btn-edit" id="enable-edit-btn" onclick="enableEditing()">
                    <i class="bi bi-pencil-square me-2"></i> <span data-i18n="btn_edit">Modifier mes informations</span>
                </button>
                <form id="profile-form">
                    <label class="form-label" data-i18n="label_name">Nom Complet</label>
                    <input type="text" id="p-name" class="form-control" disabled required>
                    <label class="form-label" data-i18n="label_email">Email</label>
                    <input type="email" id="p-email" class="form-control" readonly style="opacity: 0.7;">
                    <label class="form-label" data-i18n="label_phone">Téléphone</label>
                    <input type="text" id="p-phone" class="form-control" disabled>
                    <label class="form-label" data-i18n="label_address">Adresse</label>
                    <input type="text" id="p-street" class="form-control" disabled required>
                    <div class="row">
                        <div class="col-6"><label class="form-label" data-i18n="label_city">Ville</label><input type="text" id="p-city" class="form-control" disabled required></div>
                        <div class="col-6"><label class="form-label" data-i18n="label_zip">Zip Code</label><input type="text" id="p-zip" class="form-control" disabled required></div>
                    </div>
                    <button type="submit" class="btn-update mt-2" id="save-btn" style="display: none;" data-i18n="btn_save">Enregistrer</button>
                    <button type="button" class="btn btn-link btn-sm w-100 text-muted mt-2" id="cancel-btn" style="display: none;" onclick="window.location.reload()" data-i18n="btn_cancel">Annuler</button>
                </form>

                <h3 class="section-title mt-5"><i class="bi bi-shield-lock me-2"></i> <span data-i18n="sec_title">Sécurité</span></h3>
                <button onclick="sendResetPassword()" id="btn-reset" class="btn-outline-gold mb-4" data-i18n="btn_reset">Réinitialiser le mot de passe</button>

                <h3 class="section-title mt-4" style="color: var(--dark);">
                    <i class="bi bi-chat-dots me-2"></i> <span data-i18n="chat_title">Service Client</span> 
                    <span id="msg-badge-user" class="badge bg-danger rounded-pill ms-2" style="display:none; font-size: 0.7rem;">0</span>
                </h3>
                <div id="chat-box" style="height: 250px; overflow-y: auto; border: 1px solid #eee; padding: 15px; background: #fff; border-radius: 15px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 8px;">
                    <p class="text-center text-muted small" data-i18n="chat_start">Démarrer une conversation...</p>
                </div>
                <div class="input-group">
                    <input type="text" id="user-msg-input" class="form-control mb-0" placeholder="Votre message..." style="border-radius: 10px 0 0 10px;">
                    <button class="btn btn-dark" type="button" onclick="sendMessageToAdmin()" style="border-radius: 0 10px 10px 0; background: var(--dark);" data-i18n="btn_send">Envoyer</button>
                </div>

                <div class="mt-5 pt-4 border-top" style="opacity: 0.5;">
                    <p class="small text-muted mb-1" style="font-size: 0.7rem;">Gestion du compte</p>
                    <button onclick="startDeactivationProcess()" class="btn btn-link btn-sm text-muted p-0" style="font-size: 0.75rem; text-decoration: none;">
                        Désactiver mon compte
                    </button>
                </div>
            </div>
        </div>

        <div class="col-lg-7">
            <div class="profile-card shadow-sm">
                <h3 class="section-title"><i class="bi bi-bag-check me-2"></i> <span data-i18n="orders_title">Mes Commandes</span></h3>
                <div id="orders-list"></div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="passwordConfirmModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content border-0 shadow-lg" style="border-radius: 20px;">
            <div class="modal-body p-4 text-center">
                <h5 style="font-family: 'Cinzel'; color: var(--dark);">Vérification</h5>
                <p class="small text-muted">Veuillez entrer votre mot de passe pour confirmer la désactivation.</p>
                <input type="password" id="confirm-password-input" class="form-control text-center" placeholder="Votre mot de passe">
                <button onclick="finalAccountDeactivation()" class="btn btn-dark w-100 rounded-pill mt-3">Confirmer</button>
                <button type="button" class="btn btn-link btn-sm mt-2 text-muted" data-bs-dismiss="modal">Annuler</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="receiptModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg" style="border-radius: 20px;">
            <div class="modal-body p-4">
                <div id="printableReceipt">
                    <div class="receipt-header">
                        <img src="images/Logo1.png" alt="Logo" class="receipt-logo">
                        <h4 style="font-family: 'Cinzel'; margin: 0; color: #2C1810;">LA PRIMAVERA</h4>
                        <small class="text-muted" data-i18n="receipt_header">Reçu de Commande Officiel</small>
                    </div>
                    <div id="receipt-details"></div>
                    <div class="mt-4 text-center no-print">
                        <button class="btn btn-dark rounded-pill px-4" onclick="window.print()">
                            <i class="bi bi-printer me-2"></i>Imprimer le Reçu
                        </button>
                        <button class="btn btn-link btn-sm text-muted d-block mt-2 mx-auto" data-bs-dismiss="modal" data-i18n="btn_close">Fermer</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    (function(){ emailjs.init("3rAwOG3LSxRlSBITj"); })();

    const _supabase = supabase.createClient('https://eqgpkdbdsfbtyisfkfsx.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVxZ3BrZGJkc2ZidHlpc2ZrZnN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMzg5NjAsImV4cCI6MjA4OTgxNDk2MH0.XOiRUOt_5wwX5AcoVQX_VWL9lkNJWjA4k5-p4eEBYbg');
    const ADMIN_ID = '066bd462-a2aa-4d7d-9465-b42cefe1af7c'; 

    const translations = {
        fr: {
            nav_home: "Accueil", profile_title: "Mon Profil", btn_edit: "Modifier mes informations", label_name: "Nom Complet",
            label_email: "Email", label_phone: "Téléphone", label_address: "Adresse", label_city: "Ville", label_zip: "Zip Code",
            btn_save: "Enregistrer", btn_cancel: "Annuler", sec_title: "Sécurité", btn_reset: "Réinitialiser le mot de passe",
            chat_title: "Service Client", chat_start: "Démarrer une conversation...", btn_send: "Envoyer",
            orders_title: "Mes Commandes", receipt_header: "Reçu de Commande Officiel", btn_print: "Imprimer le Reçu", btn_close: "Fermer",
            no_orders: "Aucune commande.", btn_reçu: "Reçu", btn_annuler: "Annuler la commande"
        },
        en: {
            nav_home: "Home", profile_title: "My Profile", btn_edit: "Edit my information", label_name: "Full Name",
            label_email: "Email", label_phone: "Phone", label_address: "Address", label_city: "City", label_zip: "Zip Code",
            btn_save: "Save Changes", btn_cancel: "Cancel", sec_title: "Security", btn_reset: "Reset Password",
            chat_title: "Customer Service", chat_start: "Start a conversation...", btn_send: "Send",
            orders_title: "My Orders", receipt_header: "Official Order Receipt", btn_print: "Print Receipt", btn_close: "Close",
            no_orders: "No orders found.", btn_reçu: "Receipt", btn_annuler: "Cancel Order"
        },
        es: {
            nav_home: "Inicio", profile_title: "Mi Perfil", btn_edit: "Editar mi información", label_name: "Nombre Completo",
            label_email: "Email", label_phone: "Teléfono", label_address: "Dirección", label_city: "Ciudad", label_zip: "Código Postal",
            btn_save: "Guardar", btn_cancel: "Cancelar", sec_title: "Seguridad", btn_reset: "Restablecer contraseña",
            chat_title: "Servicio al Cliente", chat_start: "Iniciar una conversación...", btn_send: "Enviar",
            orders_title: "Mis Pedidos", receipt_header: "Recibo de Pedido Oficial", btn_print: "Imprimir Recibo", btn_close: "Cerrar",
            no_orders: "No hay pedidos.", btn_reçu: "Recibo", btn_annuler: "Cancelar pedido"
        }
    };

    function changeLanguage(lang) {
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (translations[lang][key]) el.innerText = translations[lang][key];
        });
        localStorage.setItem('laprimavera_lang', lang);
    }

    async function init() {
        const savedLang = localStorage.getItem('laprimavera_lang') || 'fr';
        document.querySelector('.lang-select').value = savedLang;
        changeLanguage(savedLang);

        try {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) { window.location.href = "login.html"; return; }
            await updateNavbar(user);
            await loadProfile(user);
            await loadOrders(user);
            await loadMessages();
        } catch (err) { console.error(err); } 
        finally { setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 600); }
    }

    async function loadOrders(user) {
        const { data: orders } = await _supabase.from('orders').select('*').eq('user_id', user.id).order('created_at', { ascending: false });
        const list = document.getElementById('orders-list');
        const lang = localStorage.getItem('laprimavera_lang') || 'fr';
        
        if (!orders || orders.length === 0) { list.innerHTML = `<p class="text-center py-4">${translations[lang].no_orders}</p>`; return; }
        
        list.innerHTML = orders.map(o => {
            // LÓGICA DO BOTÃO DE CANCELAR DENTRO DO MAP
            const cancelBtn = (o.status !== 'Annulé' && o.status !== 'Livrée' && o.status !== 'Approuvée') ? `
                <button class="btn btn-sm btn-outline-danger rounded-pill mt-2" 
                        onclick="handleCancelOrder('${o.id}', '${o.created_at}')">
                    <i class="bi bi-x-circle me-1"></i> ${translations[lang].btn_annuler}
                </button>` : o.status === 'Annulé' ? '<span class="badge bg-secondary mt-2">Annulée</span>' : '';

            return `
            <div class="order-card shadow-sm">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <strong>#${o.id.slice(0, 8).toUpperCase()}</strong>
                        <div class="small fw-bold text-rose">$${parseFloat(o.total).toFixed(2)}</div>
                        <div class="small text-muted">${new Date(o.created_at).toLocaleDateString()}</div>
                    </div>
                    <div class="text-end">
                        <span class="badge-status ${o.status === 'Approuvée' || o.status === 'Livrée' ? 'bg-success text-white' : 'bg-warning'}">${o.status}</span>
                        <button class="btn btn-sm btn-outline-dark rounded-pill d-block mt-2 no-print" onclick="showReceipt('${o.id}')">
                            <i class="bi bi-receipt me-1"></i> ${translations[lang].btn_reçu}
                        </button>
                        ${cancelBtn}
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    async function showReceipt(orderId) {
        const { data: order } = await _supabase.from('orders').select('*').eq('id', orderId).single();
        if (!order) return;
        
        const detailsHtml = `
            <div class="receipt-info mt-3">
                <p><strong>Client:</strong> ${document.getElementById('p-name').value}</p>
                <p><strong>Date:</strong> ${new Date(order.created_at).toLocaleDateString()}</p>
                <p><strong>ID:</strong> #${order.id.slice(0,8).toUpperCase()}</p>
            </div>
            <table class="receipt-table">
                <thead><tr><th>Détails</th><th class="text-end">Prix</th></tr></thead>
                <tbody>
                    <tr>
                        <td>${order.items.split(',').join('<br>')}</td>
                        <td class="text-end">$${parseFloat(order.total).toFixed(2)}</td>
                    </tr>
                </tbody>
            </table>
            <div class="receipt-total-box mt-3 text-end">
                <p class="mb-0 small">TOTAL PAYÉ</p>
                <h4 style="color: var(--gold);">$${parseFloat(order.total).toFixed(2)}</h4>
            </div>`;
            
        document.getElementById('receipt-details').innerHTML = detailsHtml;
        const myModal = new bootstrap.Modal(document.getElementById('receiptModal'));
        myModal.show();
    }

    async function handleCancelOrder(orderId, createdAt) {
        const now = new Date();
        const orderTime = new Date(createdAt);
        const diffInHours = (now - orderTime) / (1000 * 60 * 60);

        if (diffInHours > 2) {
            alert("Désolé, le délai de 2 heures pour l'annulation est dépassé. Veuillez nous contacter via WhatsApp.");
            return;
        }

        const reasons = ["Erreur de commande", "Changement d'avis", "Délai trop long", "Autre"];
        let reason = prompt("Raison de l'annulation :\n" + reasons.join("\n"));
        
        if (reason === null || reason.trim() === "") return;

        const { error } = await _supabase
            .from('orders')
            .update({ 
                status: 'Annulé', 
                cancellation_reason: reason 
            })
            .eq('id', orderId);

        if (!error) {
            alert("Votre commande a été annulée avec succès.");
            location.reload();
        } else {
            alert("Erreur: " + error.message);
        }
    }

    async function loadProfile(user) {
        const { data: p } = await _supabase.from('profiles').select('*').eq('id', user.id).maybeSingle();
        document.getElementById('p-email').value = user.email;
        if (p) {
            document.getElementById('p-name').value = p.full_name || "";
            document.getElementById('p-phone').value = p.phone || "";
            document.getElementById('p-street').value = p.street || p.address || "";
            document.getElementById('p-city').value = p.city || ""; 
            document.getElementById('p-zip').value = p.zip || "";
        }
    }

    function enableEditing() {
        ['p-name', 'p-phone', 'p-street', 'p-city', 'p-zip'].forEach(id => {
            const el = document.getElementById(id);
            if(el) el.disabled = false;
        });
        document.getElementById('enable-edit-btn').style.display = 'none';
        document.getElementById('save-btn').style.display = 'block';
        document.getElementById('cancel-btn').style.display = 'block';
    }

    async function updateNavbar(user) {
        const { data: p } = await _supabase.from('profiles').select('full_name').eq('id', user.id).maybeSingle();
        document.getElementById('auth-area').innerHTML = `<div class="dropdown user-dropdown"><a class="btn-user dropdown-toggle" href="#" data-bs-toggle="dropdown"><i class="bi bi-person-circle user-icon"></i><span>${p?.full_name?.split(' ')[0] || 'Client'}</span></a><ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2"><li><button class="dropdown-item text-danger" onclick="logout()">Déconnexion</button></li></ul></div>`;
    }

    async function sendMessageToAdmin() {
        const input = document.getElementById('user-msg-input');
        if (!input.value.trim()) return;
        const { data: { user } } = await _supabase.auth.getUser();
        await _supabase.from('messages').insert([{ sender_id: user.id, recipient_id: ADMIN_ID, content: input.value.trim() }]);
        input.value = ''; await loadMessages();
    }

    async function loadMessages() {
        const { data: { user } } = await _supabase.auth.getUser();
        const { data: msgs } = await _supabase.from('messages').select('*').or(`and(sender_id.eq.${user.id},recipient_id.eq.${ADMIN_ID}),and(sender_id.eq.${ADMIN_ID},recipient_id.eq.${user.id})`).order('created_at', { ascending: true });
        if (msgs) {
            document.getElementById('chat-box').innerHTML = msgs.map(m => `
                <div style="align-self: ${m.sender_id === user.id ? 'flex-end' : 'flex-start'}; max-width: 85%;">
                    <div style="background: ${m.sender_id === user.id ? '#E8D5C4' : '#f1f1f1'}; padding: 8px 12px; border-radius: 15px; font-size: 0.85rem; color: var(--cafe);">
                        ${m.content}
                    </div>
                </div>`).join('');
            document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
        }
    }

    document.getElementById('profile-form').onsubmit = async (e) => {
        e.preventDefault();
        const { data: { user } } = await _supabase.auth.getUser();
        await _supabase.from('profiles').upsert({ id: user.id, full_name: document.getElementById('p-name').value, phone: document.getElementById('p-phone').value, street: document.getElementById('p-street').value, city: document.getElementById('p-city').value, zip: document.getElementById('p-zip').value });
        alert("Enregistré !"); window.location.reload();
    };

    async function logout() { await _supabase.auth.signOut(); window.location.href = "index.html"; }

    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
