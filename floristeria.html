   <style>
    :root { 
        --dark: #4A2419; 
        --deep-coffee: #2C1810; 
        --rose: #C98986; 
        --bg: #E8D5C4; 
        --gold: #B8860B; 
        --accent: #B8860B; 
    }
    
    body { 
        font-family: 'Poppins', sans-serif; 
        background-color: var(--bg); 
        color: var(--dark); 
        margin: 0; 
        padding-top: 100px; 
    }
    
    .navbar { 
        background: white !important; 
        box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        padding: 0 50px !important; 
        height: 85px !important;    
        display: flex !important;
        align-items: center !important;
        position: fixed !important;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 10000 !important;
        border-bottom: 2px solid var(--gold) !important;
    }

    .navbar-brand { 
        font-family: 'Cinzel', serif; 
        font-weight: 700; 
        color: var(--deep-coffee) !important; 
        letter-spacing: 2px;
        text-transform: uppercase;
        display: flex !important; 
        align-items: center !important; 
        gap: 15px; 
        font-size: 1.4rem !important;
        text-decoration: none;
        height: 85px !important;
    }

    .nav-link { 
        font-family: 'Cinzel', serif; 
        font-size: 0.85rem !important; 
        font-weight: 600; 
        text-transform: uppercase; 
        color: var(--deep-coffee) !important; 
        letter-spacing: 1.5px; 
        padding: 0 15px !important;
        line-height: 85px !important;
    }

    .flower-moments {
        font-size: 0.8rem;
        color: #B8860B; 
        font-family: 'Poppins', sans-serif;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        line-height: 1.4;
    }
    .flower-moments strong {
        color: #2C1810; 
        font-weight: 700;
    }

    .nav-link:hover { color: var(--gold) !important; }

    .lang-select {
        border: 1px solid var(--gold); border-radius: 20px; padding: 4px 12px;
        font-size: 0.75rem; font-family: 'Cinzel', serif; color: var(--dark);
        background: white; cursor: pointer; margin-right: 15px; outline: none;
    }

    /* Estilos da Busca */
    .search-box input:focus {
        box-shadow: 0 0 5px rgba(184, 134, 11, 0.5);
        border-color: var(--gold);
        outline: none;
    }
    .search-box input::placeholder {
        font-size: 0.75rem;
        font-style: italic;
    }

    .user-dropdown .btn-user { 
        border: none; background: none; color: var(--dark); 
        display: flex; align-items: center; gap: 8px; 
        font-weight: 700; font-family: 'Cinzel', serif; font-size: 0.85rem; text-decoration: none;
        text-transform: uppercase;
    }

    .cart-container { position: relative; cursor: pointer; padding: 5px; margin-left: 15px; color: var(--dark); text-decoration: none; }
    .cart-badge { position: absolute; top: -5px; right: -5px; background: red; color: white; font-size: 0.7rem; border-radius: 50%; padding: 2px 6px; font-weight: bold; }
    
    .section-title { 
        font-family: 'Cinzel', serif; text-align: center; margin: 50px 0; 
        letter-spacing: 4px; color: var(--accent); font-size: 2.5rem; font-weight: 700;
    }

    .flower-card { background: white; border-radius: 20px; overflow: hidden; border: 1px solid #eee; transition: 0.4s; height: 100%; display: flex; flex-direction: column; }
    .flower-card:hover { transform: translateY(-8px); box-shadow: 0 12px 40px rgba(44, 24, 16, 0.15); border-color: var(--gold); }
    
    .flower-img-link { display: block; overflow: hidden; height: 400px; cursor: zoom-in; }
    .flower-img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
    .flower-card:hover .flower-img { transform: scale(1.05); }

    .flower-body { padding: 30px; flex-grow: 1; display: flex; flex-direction: column; text-align: center; }
    
    .flower-text-wrapper {
        min-height: 100px;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }

    .flower-description {
        font-size: 0.95rem; 
        color: #4A2419;    
        font-style: italic;
        font-family: 'Playfair Display', serif; 
        line-height: 1.4;
        margin-bottom: 8px !important;
        display: block;    
    }
    .flower-price { font-weight: 700; color: var(--dark); font-size: 1.5rem; margin-top: auto; display: block; font-family: 'Poppins', sans-serif; }
    
    .old-price { text-decoration: line-through; color: #999; font-size: 0.9rem; margin-right: 8px; }

    footer { 
        background-color: #2C1810; color: #fdfaf8; padding: 60px 20px 20px; 
        font-family: 'Poppins', sans-serif; margin-top: 80px; border-top: 4px solid var(--gold); 
    }
    .footer-title { font-family: 'Cinzel', serif; color: var(--gold); letter-spacing: 2px; margin-bottom: 20px; }
</style>
</head>
<body>

    <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center" href="index.html">
            <img src="images/Logo1.png" alt="Logo" style="width: 45px; height: 45px; border-radius: 50%; border: 1px solid var(--gold);">
            <span style="font-family: 'Cinzel', serif; font-weight: 700; color: #2C1810; margin-left: 10px; letter-spacing: 2px;">LA PRIMAVERA</span>
        </a>
        <div class="collapse navbar-collapse justify-content-center">
            <ul class="navbar-nav gap-3">
                <li class="nav-item"><a class="nav-link" href="index.html">ACCUEIL</a></li>
                <li class="nav-item"><a class="nav-link" href="boutique.html">PÂTISSERIE</a></li>
                <li class="nav-item"><a class="nav-link active" href="floristeria.html">FLORISTERIE</a></li>
                <li class="nav-item"><a class="nav-link" href="dejeuner.html">DÉJEUNERS</a></li>

        </div>
        <div class="d-flex align-items-center">
            <div class="search-box d-none d-lg-flex align-items-center me-3">
                <i class="bi bi-search me-2" style="color: var(--dark);"></i>
                <input type="text" id="flowerSearch" class="form-control form-control-sm" 
                       placeholder="Rechercher..." onkeyup="filterFlowers()" 
                       style="border-radius: 20px; border: 1px solid var(--gold); width: 180px;">
            </div>

            <select class="lang-select" onchange="changeLanguage(this.value)">
                <option value="fr">FR 🇫🇷</option>
                <option value="en">EN 🇺🇸</option>
                <option value="es">ES 🇪🇸</option>
            </select>
            <div id="auth-area"></div> 
            <a href="checkout.html" class="cart-container">
                <i class="bi bi-cart3 fs-4"></i>
                <span class="cart-badge" id="cartCount">0</span>
            </a>
        </div>
    </div>
</nav>

<section class="container py-5">
    <h2 class="section-title">Éclats Floraux Signature</h2>
    <div class="row row-cols-1 row-cols-md-3 g-5" id="flower-grid"></div>
</section>

<footer>
    <div class="container">
        <div class="row g-4 text-center">
            <div class="col-md-4">
                <h5 class="footer-title">LA PRIMAVERA</h5>
                <p style="font-size: 0.85rem; color: #d1c7c2;">L'excellence haïtienne raffinée. Miami . Haiti</p>
            </div>
            <div class="col-md-4">
                <h5 class="footer-title">CONTACT</h5>
                <p class="mb-1">+1 (352) 298-2578</p>
                <p>laprimavera951@gmail.com</p>
            </div>
            <div class="col-md-4">
                <h5 class="footer-title">SUIVEZ-NOUS</h5>
                <div class="d-flex justify-content-center gap-3 fs-4">
                    <a href="#" style="color: #fdfaf8;"><i class="bi bi-instagram"></i></a>
                    <a href="#" style="color: #fdfaf8;"><i class="bi bi-facebook"></i></a>
                </div>
            </div>
        </div>
        <hr style="border-top: 1px solid #4A2419; margin: 40px 0 20px;">
        <p class="text-center" style="font-size: 0.65rem; color: #888; letter-spacing: 2px;">LA PRIMAVERA &copy; 2026 | TOUS DROITS RÉSERVÉS</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/luminous-lightbox@2.3.2/dist/luminous.min.js"></script>

<script>
    const _supabase = supabase.createClient('https://eqgpkdbdsfbtyisfkfsx.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVxZ3BrZGJkc2ZidHlpc2ZrZnN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMzg5NjAsImV4cCI6MjA4OTgxNDk2MH0.XOiRUOt_5wwX5AcoVQX_VWL9lkNJWjA4k5-p4eEBYbg');

    async function init() {
        updateNavbarAuth();
        loadFlowers();
        updateCartBadge();
    }

    async function loadFlowers() {
        const grid = document.getElementById('flower-grid');
        const { data: flowers, error } = await _supabase.from('products')
            .select('id, name, description, price, image_url, stock, promo_discount_percent')
            .eq('category', 'fleur')
            .neq('is_active', false)
            .order('name');

        if (flowers) {
            grid.innerHTML = flowers.map(f => {
                const inStock = (f.stock > 0);
                let finalPrice = f.price;
                let priceDisplay = `<span class="flower-price">$${parseFloat(f.price).toFixed(2)}</span>`;

                if (f.promo_discount_percent > 0) {
                    finalPrice = (f.price * (1 - f.promo_discount_percent / 100)).toFixed(2);
                    priceDisplay = `<div><span class="old-price">$${parseFloat(f.price).toFixed(2)}</span><span class="flower-price text-danger">$${finalPrice}</span></div>`;
                }

                let pureDescription = "";
                let idealMoments = "";
                
                if (f.description) {
                    const parts = f.description.split("Idéal pour :");
                    pureDescription = parts[0] ? parts[0].trim() : "";
                    idealMoments = parts[1] ? `<strong>Idéal pour :</strong> ${parts[1].trim()}` : "";
                } else {
                    pureDescription = "Parfait pour toute occasion.";
                }

                return `
                <div class="col">
                    <div class="flower-card shadow-sm">
                        <a href="${f.image_url}" class="flower-img-link zoom-trigger">
                            <img src="${f.image_url}" class="flower-img" alt="${f.name}">
                        </a>
                        <div class="flower-body">
                            <h3 class="fw-bold mb-2" style="font-family:'Cinzel';">${f.name}</h3>
                            
                            <div class="flower-text-wrapper mb-3">
                                <p class="flower-description mb-1">${pureDescription}</p>
                                <p class="flower-moments">${idealMoments}</p>
                            </div>

                            <div class="mt-auto">
                                ${priceDisplay}
                                <button class="btn btn-dark mt-3 w-100 rounded-pill" 
                                    onclick="quickAdd('${f.id}', '${f.name.replace(/'/g, "\\'")}', ${finalPrice})" 
                                    ${!inStock ? 'disabled' : ''}>
                                    ${inStock ? 'AJOUTER AU PANIER' : 'RUPTURE DE STOCK'}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('');

            if (typeof Luminous !== 'undefined') {
                document.querySelectorAll('.zoom-trigger').forEach(el => {
                    new Luminous(el);
                });
            }
        }
    }

    function filterFlowers() {
        const searchTerm = document.getElementById('flowerSearch').value.toLowerCase();
        const flowerCards = document.querySelectorAll('#flower-grid > .col');

        flowerCards.forEach(card => {
            const name = card.querySelector('h3').innerText.toLowerCase();
            const text = card.querySelector('.flower-text-wrapper').innerText.toLowerCase();
            const price = card.querySelector('.flower-price').innerText.toLowerCase();
            
            if (name.includes(searchTerm) || text.includes(searchTerm) || price.includes(searchTerm)) {
                card.style.display = "";
            } else {
                card.style.display = "none";
            }
        });
    }

    async function quickAdd(id, name, price) {
        const { data: { user } } = await _supabase.auth.getUser();
        if (!user) { alert("Veuillez vous connecter !"); window.location.href = "login.html"; return; }

        const { error } = await _supabase.from('cart_items').insert([{
            user_id: user.id, product_id: id, product_name: name, price: price, quantity: 1
        }]);

        if (!error) { 
            alert(name + " ajouté au panier !"); 
            updateCartBadge();
        }
    }

    async function updateCartBadge() {
        const { data: { user } } = await _supabase.auth.getUser();
        if (user) {
            const { data: items } = await _supabase.from('cart_items').select('quantity').eq('user_id', user.id);
            if (items) {
                const total = items.reduce((acc, item) => acc + (item.quantity || 0), 0);
                document.getElementById('cartCount').innerText = total;
            }
        }
    }

    async function updateNavbarAuth() {
        const area = document.getElementById('auth-area');
        const { data: { user } } = await _supabase.auth.getUser();
        if (user) {
            const { data: profile } = await _supabase.from('profiles').select('full_name').eq('id', user.id).maybeSingle();
            area.innerHTML = `<div class="dropdown user-dropdown"><a class="btn-user dropdown-toggle" href="#" data-bs-toggle="dropdown"><i class="bi bi-person-circle"></i><span>${profile?.full_name?.split(' ')[0] || 'Client'}</span></a><ul class="dropdown-menu"><li><a class="dropdown-item" href="mon-compte.html">Mon Compte</a></li><li><button class="dropdown-item text-danger" onclick="logout()">Déconnexion</button></li></ul></div>`;
        } else {
            area.innerHTML = `<a href="login.html" class="btn btn-sm btn-outline-dark rounded-pill px-3">Connexion</a>`;
        }
    }

    async function logout() { await _supabase.auth.signOut(); window.location.reload(); }

    init();
</script>
</body>
</html>
