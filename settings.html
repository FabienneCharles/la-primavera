<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Settings | La Primavera</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8f9fa; padding: 50px 0; }
        .admin-card { background: white; border-radius: 15px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 5px solid #B8860B; }
        h1 { font-family: 'Cinzel', serif; color: #2C1810; margin-bottom: 30px; text-align: center; }
        .btn-save { background-color: #B8860B; color: white; border: none; padding: 12px 30px; font-weight: 600; width: 100%; transition: 0.3s; }
        .btn-save:hover { background-color: #2C1810; transform: translateY(-2px); }
        label { font-weight: 600; color: #2C1810; margin-top: 15px; }

@media (max-width: 576px) {
    body { padding: 20px 0; } /* Diminui o recuo no topo em celulares */
    .admin-card { 
        padding: 20px; /* Ganha mais espaço para o texto dentro do card */
        border-radius: 0; /* Opcional: remove arredondamento nas bordas para parecer um app nativo */
    }
    h1 { font-size: 1.5rem; } /* Título menor para não quebrar muitas linhas */
}

    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="admin-card">
                <h1>Store Settings</h1>
                <p class="text-center text-muted">Mude os textos do site abaixo e clique em Salvar.</p>
                <hr>

                <form id="settings-form">
                    <h5 class="mt-4 text-primary">Página "About Us"</h5>
                    
                    <label>Título da História</label>
                    <input type="text" id="set-title" class="form-control" placeholder="Ex: Our Story">

                    <label>Subtítulo</label>
                    <input type="text" id="set-subtitle" class="form-control" placeholder="Ex: A Taste of Home">

                    <label>Texto da História (Descrição)</label>
                    <textarea id="set-desc" class="form-control" rows="5" placeholder="Escreva a história aqui..."></textarea>

                    <label>Link da Imagem (URL)</label>
                    <input type="text" id="set-img" class="form-control" placeholder="Caminho da imagem (ex: images/Logo1.png)">

                    <hr class="my-5">

                    <button type="submit" class="btn-save">SALVAR TODAS AS MUDANÇAS</button>
                </form>
                
                <div id="status-msg" class="mt-3 text-center fw-bold"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // Configuração do Supabase
    const _supabase = supabase.createClient('https://eqgpkdbdsfbtyisfkfsx.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVxZ3BrZGJkc2ZidHlpc2ZrZnN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMzg5NjAsImV4cCI6MjA4OTgxNDk2MH0.XOiRUOt_5wwX5AcoVQX_VWL9lkNJWjA4k5-p4eEBYbg');

    // 1. Carregar os dados atuais para o formulário
    async function loadCurrentSettings() {
        const { data } = await _supabase.from('site_settings').select('*').eq('id', 'about_page').maybeSingle();
        if (data) {
            document.getElementById('set-title').value = data.title || '';
            document.getElementById('set-subtitle').value = data.subtitle || '';
            document.getElementById('set-desc').value = data.description || '';
            document.getElementById('set-img').value = data.image_url || '';
        }
    }

    // 2. Salvar as mudanças no banco
    document.getElementById('settings-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const msg = document.getElementById('status-msg');
        msg.innerText = "Salvando...";

        const { error } = await _supabase.from('site_settings').upsert({
            id: 'about_page',
            title: document.getElementById('set-title').value,
            subtitle: document.getElementById('set-subtitle').value,
            description: document.getElementById('set-desc').value,
            image_url: document.getElementById('set-img').value
        });

        if (error) {
            msg.innerText = "Erro ao salvar: " + error.message;
            msg.className = "mt-3 text-center text-danger";
        } else {
            msg.innerText = "MUDANÇAS SALVAS COM SUCESSO! 🎉";
            msg.className = "mt-3 text-center text-success";
            setTimeout(() => msg.innerText = "", 3000);
        }
    });

    document.addEventListener('DOMContentLoaded', loadCurrentSettings);
</script>
</body>
</html>
