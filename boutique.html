<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boutique | La Primavera</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/luminous-lightbox@2.3.2/dist/luminous-basic.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --gold: #B8860B;
            --cafe: #2C1810; 
            --luxury-bg: #E8D5C4; 
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: var(--luxury-bg) !important; 
            padding-top: 90px; 
            color: var(--cafe);
            margin: 0;
        }

        .navbar { 
            background: white !important; 
            padding: 12px 50px; 
            border-bottom: 2px solid var(--gold); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 10000;
        }

        /* IDIOMA SELECTOR */
        .lang-select {
            border: 1px solid var(--gold);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.75rem;
            font-family: 'Cinzel', serif;
            color: var(--cafe);
            background: white;
            cursor: pointer;
            margin-right: 15px;
            outline: none;
        }

        .cart-container { position: relative; cursor: pointer; padding: 5px; color: var(--cafe); text-decoration: none; margin-left: 15px; }
        .cart-badge { 
            position: absolute; top: -5px; right: -5px; background: red; color: white; 
            font-size: 0.7rem; border-radius: 50%; padding: 2px 6px; font-weight: bold; 
        }

        .user-dropdown .btn-user { 
            border: none; 
            background: none; 
            color: var(--cafe); 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            font-weight: 700;
            font-family: 'Cinzel', serif;
            font-size: 0.85rem;
            text-decoration: none;
            text-transform: uppercase;
        }
        .user-icon { font-size: 1.6rem; color: var(--cafe); }

        .navbar-brand { 
            font-family: 'Cinzel', serif; 
            font-weight: 700; 
            color: var(--cafe) !important; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            letter-spacing: 2px;
        }

        .brand-logo { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 1px solid var(--gold); }

        .nav-link { 
            font-family: 'Cinzel', serif; 
            font-size: 0.8rem; 
            letter-spacing: 1.5px; 
            color: var(--cafe) !important; 
            font-weight: 600; 
            text-transform: uppercase;
        }

        .product-card { 
            background: white; border-radius: 20px; overflow: hidden; border: none; 
            box-shadow: 0 15px 35px rgba(44, 24, 16, 0.12); 
            transition: 0.4s; height: 100%; display: flex; flex-direction: column; 
        }
        .product-card:hover { transform: translateY(-10px); }
        
        .img-zoom-container { height: 280px; overflow: hidden; cursor: zoom-in; }
        .product-img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
        .product-card:hover .product-img { transform: scale(1.1); }

        .product-body { padding: 25px; flex-grow: 1; text-align: center; display: flex; flex-direction: column; }
        .product-body h4 { font-family: 'Cinzel', serif; font-size: 1.2rem; margin-bottom: 10px; color: var(--cafe); }
        
        .price-tag { font-size: 1.4rem; font-weight: 700; color: var(--gold); margin: 15px 0; }
        .old-price { text-decoration: line-through; color: #999; font-size: 0.9rem; margin-right: 8px; }
        .new-price { color: #e63946; font-weight: 700; }
        .promo-badge { background: #e63946; color: white; padding: 2px 10px; border-radius: 50px; font-size: 0.75rem; font-weight: bold; margin-left: 8px; display: inline-block; vertical-align: middle; animation: pulse 2s infinite; }
        .countdown-timer { font-size: 0.75rem; color: #e63946; font-weight: 700; background: rgba(230, 57, 70, 0.1); padding: 4px 12px; border-radius: 50px; display: inline-block; margin-top: 8px; border: 1px solid rgba(230, 57, 70, 0.2); }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .btn-add { 
            background: var(--cafe); color: white; border: none; padding: 12px; 
            font-family: 'Cinzel', serif; letter-spacing: 2px; width: 100%; 
            transition: 0.3s; text-transform: uppercase; margin-top: auto;
        }
        .btn-add:hover { background: var(--gold); }

        .btn-unavailable {
            background: #dcdcdc; color: #888; border: none; padding: 12px;
            font-family: 'Cinzel', serif; letter-spacing: 2px; width: 100%;
            text-transform: uppercase; margin-top: auto; cursor: not-allowed;
        }

        footer { 
            background-color: var(--cafe); 
            color: #fdfaf8; 
            padding: 60px 20px 20px; 
            font-family: 'Poppins', sans-serif; 
            margin-top: 80px;
            border-top: 4px solid var(--gold); 
        }
        .footer-title { font-family: 'Cinzel', serif; color: var(--gold); letter-spacing: 2px; margin-bottom: 20px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center" href="index.html">
            <img src="images/Logo1.png" alt="Logo" class="brand-logo">
            <span style="font-family: 'Cinzel', serif; font-weight: 700; color: #2C1810; margin-left: 10px; letter-spacing: 2px;">LA PRIMAVERA</span>
        </a>
        
        <div class="collapse navbar-collapse justify-content-center">
            <ul class="navbar-nav gap-3">
                <li class="nav-item"><a class="nav-link" href="index.html" data-i18n="nav_home">ACCUEIL</a></li>
                <li class="nav-item"><a class="nav-link active" href="boutique.html" style="border-bottom: 2px solid var(--gold);" data-i18n="nav_patis">PÂTISSERIE</a></li>
                <li class="nav-item"><a class="nav-link" href="floristeria.html" data-i18n="nav_flor">FLORISTERIE</a></li>
                <li class="nav-item"><a class="nav-link" href="dejeuner.html" data-i18n="nav_deje">DÉJEUNERS</a></li>
            </ul>
        </div>
        
        <div class="d-flex align-items-center">
            <select class="lang-select" onchange="changeLanguage(this.value)">
                <option value="fr">FR 🇫🇷</option>
                <option value="en">EN 🇺🇸</option>
                <option value="es">ES 🇪🇸</option>
            </select>

            <div id="auth-area"></div> 
            <a href="checkout.html" class="cart-container">
                <i class="bi bi-cart3 fs-4"></i>
                <span id="cartCount" class="cart-badge">0</span>
            </a>
        </div>
    </div>
</nav>

<div class="container py-5">
    <h2 class="display-5 fw-bold text-center mb-5" style="font-family: 'Cinzel', serif; color: var(--gold);" data-i18n="page_title">Douceurs Haïtiennes</h2>
    <div class="row g-5" id="products">
        <div class="text-center w-100 py-5">
            <div class="spinner-border text-brown" role="status"></div>
            <p class="mt-2" data-i18n="loading">Chargement de la pâtisserie...</p>
        </div>
    </div>
</div>

<footer>
    <div class="container">
        <div class="row g-4 text-center">
            <div class="col-md-4">
                <h5 class="footer-title">LA PRIMAVERA</h5>
                <p style="font-size: 0.85rem; color: #d1c7c2;" data-i18n="footer_brand">L'excellence haïtienne raffinée.</p>
            </div>
            <div class="col-md-4">
                <h5 class="footer-title" data-i18n="footer_contact">CONTACT</h5>
                <p class="mb-1">+1 (352) 298-2578</p>
                <p>laprimavera951@gmail.com</p>
            </div>
            <div class="col-md-4">
                <h5 class="footer-title" data-i18n="footer_follow">SUIVEZ-NOUS</h5>
                <div class="d-flex justify-content-center gap-3 fs-4">
                    <a href="#" style="color: #fdfaf8;"><i class="bi bi-instagram"></i></a>
                    <a href="#" style="color: #fdfaf8;"><i class="bi bi-facebook"></i></a>
                </div>
            </div>
        </div>
        <hr style="border-top: 1px solid #4A2419; margin: 40px 0 20px;">
        <p class="text-center" style="font-size: 0.65rem; color: #888; letter-spacing: 2px;">LA PRIMAVERA &copy; 2026 | TOUS DROITS RÉSERVÉS</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/luminous-lightbox@2.3.2/dist/luminous.min.js"></script>
<script>
    // --- DICIONÁRIO DE TRADUÇÕES ---
    const translations = {
        fr: {
            nav_home: "ACCUEIL", nav_patis: "PÂTISSERIE", nav_flor: "FLORISTERIE", nav_deje: "DÉJEUNERS",
            page_title: "Douceurs Haïtiennes", loading: "Chargement de la pâtisserie...", footer_brand: "L'excellence haïtienne raffinée.",
            footer_contact: "CONTACT", footer_follow: "SUIVEZ-NOUS", btn_add: "Ajouter au panier", btn_out: "Indisponible",
            alert_login: "Veuillez vous connecter.", alert_stock: "Désolé, ce produto vient d'être épuisé.", msg_added: "ajouté!",
            no_products: "Aucun délice disponible."
        },
        en: {
            nav_home: "HOME", nav_patis: "PASTRY", nav_flor: "FLORISTRY", nav_deje: "LUNCHES",
            page_title: "Haitian Delights", loading: "Loading pastry shop...", footer_brand: "Refined Haitian excellence.",
            footer_contact: "CONTACT", footer_follow: "FOLLOW US", btn_add: "Add to cart", btn_out: "Out of Stock",
            alert_login: "Please log in first.", alert_stock: "Sorry, this product is out of stock.", msg_added: "added!",
            no_products: "No delights available."
        },
        es: {
            nav_home: "INICIO", nav_patis: "REPOSTERÍA", nav_flor: "FLORISTERÍA", nav_deje: "ALMUERZOS",
            page_title: "Dulces Haitianos", loading: "Cargando pastelería...", footer_brand: "Excelencia haitiana refinada.",
            footer_contact: "CONTACTO", footer_follow: "SÍGUENOS", btn_add: "Añadir al carrito", btn_out: "Agotado",
            alert_login: "Por favor, inicie sesión.", alert_stock: "Lo sentimos, producto agotado.", msg_added: "añadido!",
            no_products: "No hay delicias disponibles."
        }
    };

    function changeLanguage(lang) {
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (translations[lang][key]) el.innerText = translations[lang][key];
        });
        localStorage.setItem('laprimavera_lang', lang);
        load(); // Recarrega os botões dos produtos
    }

    const _supabase = supabase.createClient('https://eqgpkdbdsfbtyisfkfsx.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVxZ3BrZGJkc2ZidHlpc2ZrZnN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMzg5NjAsImV4cCI6MjA4OTgxNDk2MH0.XOiRUOt_5wwX5AcoVQX_VWL9lkNJWjA4k5-p4eEBYbg');

    function startCountdowns() {
        setInterval(() => {
            document.querySelectorAll('.countdown-timer').forEach(timer => {
                const expiryDate = new Date(timer.dataset.expiry).getTime();
                const now = new Date().getTime();
                const distance = expiryDate - now;
                if (distance < 0) { timer.style.display = 'none'; return; }
                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);
                timer.querySelector('.timer-val').innerText = `${days > 0 ? days + "d " : ""}${hours.toString().padStart(2, '0')}h ${minutes.toString().padStart(2, '0')}m ${seconds.toString().padStart(2, '0')}s`;
            });
        }, 1000);
    }

    async function trackView(productId) {
        try {
            const { data: existing } = await _supabase.from('product_views').select('*').eq('product_id', productId).maybeSingle();
            if (existing) {
                await _supabase.from('product_views').update({ view_count: existing.view_count + 1, last_view: new Date() }).eq('id', existing.id);
            } else {
                await _supabase.from('product_views').insert([{ product_id: productId, view_count: 1 }]);
            }
        } catch (e) { console.error("Tracking error", e); }
    }

    async function updateNavbarAuth() {
        const area = document.getElementById('auth-area');
        const { data: { user } } = await _supabase.auth.getUser();
        if (user) {
            const { data: profile } = await _supabase.from('profiles').select('full_name').eq('id', user.id).maybeSingle();
            const firstName = profile?.full_name ? profile.full_name.split(' ')[0] : "Client";
            area.innerHTML = `
                <div class="dropdown user-dropdown">
                    <a class="btn-user dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle user-icon"></i><span>${firstName}</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2">
                        <li><a class="dropdown-item" href="mon-compte.html">Mon Compte</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><button class="dropdown-item text-danger" onclick="logout()">Déconnexion</button></li>
                    </ul>
                </div>`;
            syncCartFromDB(user.id);
        } else {
            area.innerHTML = `<a href="login.html" class="btn btn-sm btn-outline-dark rounded-pill px-3">Connexion</a>`;
        }
    }

    async function logout() { localStorage.removeItem('cart'); await _supabase.auth.signOut(); window.location.reload(); }

    async function syncCartFromDB(userId) {
        const { data: items } = await _supabase.from('cart_items').select('*').eq('user_id', userId);
        if (items) {
            const cartMapped = items.map(i => ({ id: i.id, name: i.product_name || i.name, price: parseFloat(i.price) || 0, quantity: parseInt(i.quantity) || 1 }));
            localStorage.setItem('cart', JSON.stringify(cartMapped));
            updateCartCount();
        }
    }

    function updateCartCount() {
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        const count = cart.reduce((acc, item) => acc + item.quantity, 0);
        const badge = document.getElementById('cartCount');
        if(badge) badge.innerText = count;
    }

    async function load() {
        const { data } = await _supabase.from('patisserie').select('*').neq('is_active', false).order('name', { ascending: true });
        const grid = document.getElementById('products');
        const lang = localStorage.getItem('laprimavera_lang') || 'fr';
        
        if(data && data.length > 0) {
            grid.innerHTML = data.map(p => {
                const inStock = (p.stock > 0);
                const now = new Date();
                const expiry = p.promo_expiry_date ? new Date(p.promo_expiry_date + "T23:59:59") : null;
                const isPromoValid = p.promo_discount_percent > 0 && (!expiry || expiry >= now);
                
                let priceDisplay = `<div class="price-tag">$${parseFloat(p.price).toFixed(2)}</div>`;
                let finalPrice = p.price;
                let timerHTML = "";

                if (isPromoValid) {
                    finalPrice = (p.price * (1 - p.promo_discount_percent / 100)).toFixed(2);
                    priceDisplay = `<div class="mb-1"><span class="old-price">$${parseFloat(p.price).toFixed(2)}</span><span class="new-price">$${finalPrice}</span><span class="promo-badge">-${p.promo_discount_percent}%</span></div>`;
                    if (expiry) timerHTML = `<div class="countdown-timer" data-expiry="${p.promo_expiry_date}T23:59:59"><i class="bi bi-clock-history me-1"></i> <span class="timer-val">--:--:--</span></div>`;
                }

                return `
                <div class="col-md-4">
                    <div class="product-card">
                        <div class="img-zoom-container">
                            <a href="${p.image_url}" class="zoom" data-id="${p.id}">
                                <img src="${p.image_url}" class="product-img" alt="${p.name}" loading="lazy" style="${!inStock ? 'filter: grayscale(0.8);' : ''}">
                            </a>
                        </div>
                        <div class="product-body">
                            <h4 class="fw-bold mb-2">${p.name}</h4>
                            <p class="text-muted small">${p.description || 'Artisanat haïtien haut de gamme.'}</p>
                            ${priceDisplay}
                            ${timerHTML}
                            ${inStock 
                                ? `<button class="btn-add" onclick="add('${p.name.replace(/'/g, "\\'")}', ${finalPrice}, '${p.image_url}', '${p.id}')">${translations[lang].btn_add}</button>`
                                : `<button class="btn-unavailable" disabled>${translations[lang].btn_out}</button>`
                            }
                        </div>
                    </div>
                </div>`;
            }).join('');
            
            startCountdowns();
            document.querySelectorAll('.zoom').forEach(el => { new Luminous(el); el.addEventListener('click', () => trackView(el.getAttribute('data-id'))); });
        } else {
            grid.innerHTML = `<p class='text-center w-100 py-5 text-muted'>${translations[lang].no_products}</p>`;
        }
        updateCartCount();
    }

    async function add(name, price, imageUrl, productId) {
        const lang = localStorage.getItem('laprimavera_lang') || 'fr';
        const { data: { user } } = await _supabase.auth.getUser();
        if (!user) { alert(translations[lang].alert_login); window.location.href = "login.html"; return; }
        
        const { data: check } = await _supabase.from('patisserie').select('stock').eq('id', productId).single();
        if(check && check.stock <= 0) { alert(translations[lang].alert_stock); load(); return; }

        trackView(productId);
        const { error } = await _supabase.from('cart_items').insert([{ user_id: user.id, product_name: name, price: price, image_url: imageUrl, quantity: 1 }]);
        if (!error) { await syncCartFromDB(user.id); alert(`${name} ${translations[lang].msg_added}`); }
    }

    document.addEventListener('DOMContentLoaded', () => {
        const savedLang = localStorage.getItem('laprimavera_lang') || 'fr';
        document.querySelector('.lang-select').value = savedLang;
        changeLanguage(savedLang);
        updateNavbarAuth();
    });
</script>
</body>
</html>
