<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merci pour votre commande ! | La Primavera</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --dark: #4A2419; --rose: #C98986; --bg: #fdfaf8; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg); color: var(--dark); height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        
        .success-card { 
            background: white; border-radius: 30px; padding: 50px; text-align: center; 
            max-width: 600px; box-shadow: 0 15px 40px rgba(0,0,0,0.05); border: 1px solid #eee;
        }
        .success-icon { font-size: 5rem; color: #28a745; margin-bottom: 20px; display: block; }
        h1 { font-family: 'Playfair Display', serif; font-weight: 700; margin-bottom: 20px; color: var(--dark); }
        p { color: #666; font-size: 1.1rem; line-height: 1.6; }
        
        .btn-home { 
            background: var(--dark); color: white; border-radius: 50px; padding: 12px 40px; 
            font-weight: 600; text-decoration: none; display: inline-block; margin-top: 30px; transition: 0.3s;
        }
        .btn-home:hover { background: var(--rose); color: white; transform: scale(1.05); }
        
        .order-number { background: #f8f9fa; padding: 10px 20px; border-radius: 10px; display: inline-block; font-family: monospace; font-weight: bold; margin: 20px 0; border: 1px dashed #ccc; }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="success-card">
        <span class="success-icon">✅</span>
        <h1 id="welcome-msg">Merci !</h1>
        <p>Votre commande a été reçue avec succès par l'équipe <strong>La Primavera</strong>.</p>
        
        <div class="order-number">
            REF: <span id="ref-id">...</span>
        </div>

        <p class="small">Nous préparons déjà vos délices et vos fleurs avec tout notre amour. Vous recevrez une confirmation finale via WhatsApp ou E-mail sous peu.</p>
        
        <a href="index.html" class="btn-home">Retour à l'accueil</a>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://eqgpkdbdsfbtyisfkfsx.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVxZ3BrZGJkc2ZidHlpc2ZrZnN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMzg5NjAsImV4cCI6MjA4OTgxNDk2MH0.XOiRUOt_5wwX5AcoVQX_VWL9lkNJWjA4k5-p4eEBYbg';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function personalizeSuccess() {
        // 1. Gera um número de referência aleatório
        const randomRef = 'LP' + Math.floor(Math.random() * 90000 + 10000);
        document.getElementById('ref-id').innerText = randomRef;

        // 2. Busca o nome do cliente logado
        const { data: { user } } = await _supabase.auth.getUser();
        if (user) {
            const { data: profile } = await _supabase
                .from('profiles')
                .select('full_name')
                .eq('id', user.id)
                .single();

            if (profile && profile.full_name) {
                const firstName = profile.full_name.split(' ')[0];
                document.getElementById('welcome-msg').innerText = `Merci, ${firstName} !`;
            }
        }
        
        // 3. Limpa o carrinho após o sucesso
        localStorage.removeItem('cart');
    }

    document.addEventListener('DOMContentLoaded', personalizeSuccess);
</script>

</body>
</html>
