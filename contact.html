<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | La Primavera</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root { --dark: #4A2419; --rose: #C98986; --bg: #fdfaf8; --gold: #B8860B; }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: var(--bg); 
            color: var(--dark); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh;
        }

        /* Navbar Responsiva */
        .navbar { 
            background: white; 
            border-bottom: 2px solid var(--gold); 
            padding: 15px 0; 
        }
        .navbar img { height: 60px; transition: 0.3s; }

        .contact-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .contact-card {
            background: white;
            border-radius: 35px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 15px 40px rgba(74, 36, 25, 0.05);
            text-align: center;
            border: 1px solid rgba(0,0,0,0.03);
        }

        h2 { 
            font-family: 'Playfair Display', serif; 
            font-weight: 700; 
            margin-bottom: 30px; 
            color: var(--dark);
        }

        .contact-item {
            display: flex;
            align-items: center;
            background: #fafafa;
            padding: 15px 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            text-decoration: none;
            color: var(--dark);
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .contact-item:hover {
            background: white;
            border-color: var(--rose);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(201, 137, 134, 0.1);
            color: var(--rose);
        }

        .contact-item i {
            font-size: 1.5rem;
            margin-right: 15px;
            color: var(--gold);
        }

        .contact-item span { font-weight: 500; font-size: 0.95rem; }

        .btn-back {
            display: inline-block;
            margin-top: 25px;
            color: #888;
            text-decoration: none;
            font-size: 0.85rem;
            transition: 0.3s;
        }
        .btn-back:hover { color: var(--dark); }

        /* Media Query para Mobile */
        @media (max-width: 576px) {
            .contact-card { padding: 30px 20px; border-radius: 25px; }
            .navbar img { height: 50px; }
            h2 { font-size: 1.75rem; }
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <div class="container d-flex justify-content-center">
            <a href="index.html">
                <img src="images/Logo Primavera.png" alt="La Primavera Logo">
            </a>
        </div>
    </nav>

    <div class="contact-container">
        <div class="contact-card">
            <h2>Contactez-nous</h2>
            
            <p class="text-muted small mb-4">Une question ? Notre équipe est à sua disposição pour vous aider.</p>

            <a href="mailto:laprimavera951@gmail.com" class="contact-item">
                <i class="bi bi-envelope-heart"></i>
                <span>laprimavera951@gmail.com</span>
            </a>

            <a href="https://wa.me/13522982578" target="_blank" class="contact-item">
                <i class="bi bi-whatsapp"></i>
                <span>+1 (352) 298-2578</span>
            </a>

            <a href="#" class="contact-item">
                <i class="bi bi-instagram"></i>
                <span>@laprimavera_usa</span>
            </a>

            <a href="index.html" class="btn-back">
                <i class="bi bi-arrow-left me-1"></i> Retour à l'accueil
            </a>
        </div>
    </div>

</body>
</html>
