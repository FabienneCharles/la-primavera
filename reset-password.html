<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Récupération | La Primavera</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background-color: #888; font-family: sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0;">

<div style="background: #fdfaf8; padding: 40px; border-radius: 35px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2);">
    
    <img src="images/Logo1.png" alt="Logo" style="width: 80px; border-radius: 50%; margin-bottom: 20px;">
    
    <h2 style="color: #4A2419; margin-bottom: 5px;">Récupération</h2>
    <p style="color: #666; font-size: 0.9rem; margin-bottom: 20px;">Heureux de vous revoir !</p>

    <p style="font-size: 0.85rem; color: #888; margin-bottom: 20px;">Entrez votre email pour recevoir un lien de réinitialisation.</p>

    <form id="recovery-form">
        <div style="margin-bottom: 20px;">
            <input type="email" 
                   id="recovery-email" 
                   placeholder="votre@email.com" 
                   required 
                   style="width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #ddd; background-color: white !important; color: black !important; display: block !important; visibility: visible !important;">
        </div>

        <button type="submit" id="btn-recovery" style="background-color: #63433f; color: white; border: none; border-radius: 50px; padding: 15px; width: 100%; font-weight: 600; font-size: 1.1rem; cursor: pointer;">
            Envoyer le lien
        </button>
    </form>

    <a href="login.html" style="display: block; margin-top: 25px; color: #888; text-decoration: none; font-size: 0.85rem;">← Retour à la connexion</a>
</div>

<script>
    const SUPABASE_URL = 'https://eqgpkdbdsfbtyisfkfsx.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVxZ3BrZGJkc2ZidHlpc2ZrZnN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMzg5NjAsImV4cCI6MjA4OTgxNDk2MH0.XOiRUOt_5wwX5AcoVQX_VWL9lkNJWjA4k5-p4eEBYbg';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    document.getElementById('recovery-form').onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('recovery-email').value;
        const btn = document.getElementById('btn-recovery');

        btn.innerText = "Envoi...";
        btn.disabled = true;

        const { error } = await _supabase.auth.resetPasswordForEmail(email, {
            redirectTo: window.location.origin + '/nouveau-mot-de-passe.html',
        });

        if (error) {
            alert("Erreur: " + error.message);
            btn.innerText = "Envoyer le lien";
            btn.disabled = false;
        } else {
            alert("Lien envoyé ! Vérifiez votre boîte mail.");
            window.location.href = "login.html";
        }
    };
</script>

</body>
</html>
