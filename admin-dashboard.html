<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion Primavera | Admin Dashboard</title>
    
    <!-- Bootstrap & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- Supabase & EmailJS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        :root { --gold: #B8860B; --dark-brown: #4A2419; }
        body { background-color: #f8f9fa; font-family: 'Poppins', sans-serif; }
        .sidebar { background: var(--dark-brown); color: white; min-height: 100vh; width: 250px; position: fixed; border-right: 4px solid var(--gold); }
        .main-content { margin-left: 250px; padding: 30px; }
        .table-primavera { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .table thead { background: var(--dark-brown); color: white; }
        .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
        #admin-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        
        /* Links de clientes */
        .client-link { color: var(--gold); text-decoration: underline; cursor: pointer; font-weight: 600; }
        .client-link:hover { color: var(--dark-brown); }

        /* Botões de ação */
        .btn-approve { color: #28a745; background: #e8f5e9; border: none; }
        .btn-approve:hover { background: #28a745; color: white; }
        .btn-decline { color: #dc3545; background: #fbe9eb; border: none; }
        .btn-decline:hover { background: #dc3545; color: white; }
    </style>
</head>
<body>

<div id="admin-overlay">
    <div class="text-center">
        <div class="spinner-border text-warning mb-3"></div>
        <p>Vérification de sécurité en cours...</p>
    </div>
</div>

<div class="sidebar d-flex flex-column p-3">
    <h3 class="text-center mb-4" style="color: var(--gold); font-family: serif;">LA PRIMAVERA</h3>
    <hr>
    <ul class="nav nav-pills flex-column mb-auto">
        <li class="nav-item">
            <a href="#" class="nav-link text-white active bg-dark"><i class="bi bi-cart-check me-2"></i> COMMANDES</a>
        </li>
        <li><a href="#" class="nav-link text-white"><i class="bi bi-people me-2"></i> CLIENTS</a></li>
    </ul>
    <hr>
    <button class="btn btn-outline-light btn-sm" onclick="logoutAdmin()">Déconnexion</button>
</div>

<div class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Gestionnaire <small class="text-muted" id="admin-name">...</small></h1>
        <button class="btn btn-warning" onclick="loadData()"><i class="bi bi-arrow-clockwise"></i> Actualiser</button>
    </div>

    <div class="table-primavera">
        <table class="table table-hover align-middle mb-0">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Client</th>
                    <th>Produits</th>
                    <th>Total</th>
                    <th>Statut</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="orders-body">
                <!-- Carregado via JS -->
            </tbody>
        </table>
    </div>
</div>

<script>
    // 1. CONFIGURAÇÃO (Troque pelas suas chaves reais)
    emailjs.init("SEU_USER_ID_EMAILJS"); 
    const _supabase = supabase.createClient('https://eqgpkdbdsfbtyisfkfsx.supabase.co', 'SUA_KEY_ANON');

    async function checkSecurityAndActions() {
        const { data: { user } } = await _supabase.auth.getUser();
        if (!user) { window.location.href = "admin-login.html"; return; }

        const { data: p } = await _supabase.from('profiles').select('is_admin, full_name').eq('id', user.id).maybeSingle();

        if (!p || p.is_admin !== true) {
            alert("Accès refusé !");
            window.location.href = "index.html";
            return;
        }

        document.getElementById('admin-name').innerText = p.full_name;
        document.getElementById('admin-overlay').style.display = 'none';

        const params = new URLSearchParams(window.location.search);
        const action = params.get('action');
        const orderId = params.get('id');

        if (action && orderId) {
            await processAdminAction(action, orderId);
        } else {
            loadData();
        }
    }

    async function loadData() {
        const { data: orders, error } = await _supabase.from('orders').select('*').order('created_at', { ascending: false });
        if (error) return console.error(error);

        const tbody = document.getElementById('orders-body');
        tbody.innerHTML = orders.map(o => `
            <tr>
                <td>${new Date(o.created_at).toLocaleDateString()}</td>
                <td>
                    <span class="client-link" onclick="showCustomerDetails('${o.id}')">${o.customer_name}</span><br>
                    <small class="text-muted">${o.customer_email}</small>
                </td>
                <td style="font-size: 0.85rem;">${o.items}</td>
                <td class="fw-bold text-success">$${o.total.toFixed(2)}</td>
                <td><span class="status-badge ${getStatusClass(o.status)}">${o.status}</span></td>
                <td>
                    <div class="btn-group">
                        <button class="btn btn-sm btn-approve" onclick="processAdminAction('approve', '${o.id}')"><i class="bi bi-check-circle-fill"></i></button>
                        <button class="btn btn-sm btn-decline" onclick="processAdminAction('decline', '${o.id}')"><i class="bi bi-x-circle-fill"></i></button>
                    </div>
                </td>
            </tr>
        `).join('');
    }

    // FUNÇÃO CORRIGIDA: Puxa os dados salvos na comanda para não depender de perfis nulos
    async function showCustomerDetails(orderId) {
        // Buscamos os dados diretamente da tabela ORDERS
        const { data: order, error } = await _supabase
            .from('orders')
            .select('*')
            .eq('id', orderId)
            .single();

        if (error || !order) return alert("Commande introuvable.");

        // Montamos a informação baseada no que foi salvo no checkout
        let details = `🌸 DÉTAILS DU CLIENT 🌸\n----------------------\n`;
        details += `👤 NOM: ${order.customer_name}\n`;
        details += `📧 EMAIL: ${order.customer_email || 'Non fourni'}\n`;
        details += `🏠 ADRESSE: ${order.address || 'Non fournie'}\n`;
        details += `💳 PAIEMENT: ${order.payment_method || 'N/A'}`;

        // Se houver um user_id e ele não for nulo, tentamos buscar o telefone complementar no Perfil
        if (order.user_id) {
            const { data: profile } = await _supabase.from('profiles').select('phone').eq('id', order.user_id).maybeSingle();
            if (profile && profile.phone) {
                details += `\n📞 TÉLÉPHONE: ${profile.phone}`;
            }
        }

        alert(details);
    }

    function getStatusClass(status) {
        if (status === 'Approved') return 'bg-success text-white';
        if (status === 'Declined') return 'bg-danger text-white';
        return 'bg-warning text-dark';
    }

    async function processAdminAction(action, orderId) {
        if (action === 'approve') {
            if (confirm("Approuver cette commande ?")) {
                const { error } = await _supabase.from('orders').update({ status: 'Approved' }).eq('id', orderId);
                if (!error) {
                    alert("Approuvée !");
                    sendEmailNotification(orderId, "APPROUVÉE", "Votre commande est validée.");
                }
            }
        } else if (action === 'decline') {
            const reason = prompt("MOTIF DU REFUS (sera envoyé au client) :");
            if (reason) {
                const { error } = await _supabase.from('orders').update({ status: 'Declined', admin_notes: reason }).eq('id', orderId);
                if (!error) {
                    alert("Refusée.");
                    sendEmailNotification(orderId, "REFUSÉE", reason);
                }
            }
        }
        window.history.replaceState({}, document.title, window.location.pathname);
        loadData();
    }

    async function sendEmailNotification(orderId, statusLabel, messageContent) {
        const { data: order } = await _supabase.from('orders').select('*').eq('id', orderId).single();
        if (!order) return;

        const templateParams = {
            to_email: order.customer_email,
            customer_name: order.customer_name,
            status: statusLabel,
            reason_note: messageContent,
            order_id: order.id.slice(0,8),
            total_price: order.total
        };

        emailjs.send('SEU_SERVICE_ID', 'SEU_TEMPLATE_ID', templateParams);
    }

    async function logoutAdmin() {
        await _supabase.auth.signOut();
        window.location.href = "index.html";
    }

    checkSecurityAndActions();
</script>
</body>
</html>
