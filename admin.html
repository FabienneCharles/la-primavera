<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Primavera | Dashboard Suprême</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --sidebar-color: #2C1810; --accent: #B8860B; --gold: #D4AF37; --bg-light: #f4f1ee; }
        body { background-color: var(--bg-light); font-family: 'Poppins', sans-serif; margin: 0; display: none; overflow-x: hidden; }
        .wrapper { display: flex; min-height: 100vh; }
        
        /* SIDEBAR AJUSTADA PARA RESPONSIVIDADE */
        .sidebar { width: 280px; background: var(--sidebar-color); color: white; padding: 25px; position: fixed; height: 100%; border-right: 4px solid var(--accent); z-index: 1000; display: flex; flex-direction: column; transition: 0.3s; }
        .sidebar-logo { width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--accent); display: block; margin: 0 auto 15px; object-fit: cover; }
        .sidebar h4 { font-family: 'Cinzel', serif; color: var(--gold); text-align: center; margin-bottom: 30px; font-size: 1rem; letter-spacing: 2px; }
        
        .nav-link-custom { display: block; width: 100%; padding: 12px; color: #d1c7c3; text-decoration: none; border: none; background: none; text-align: left; border-radius: 6px; margin-bottom: 5px; font-family: 'Cinzel', serif; font-size: 0.8rem; cursor: pointer; transition: 0.3s; position: relative; }
        .nav-link-custom.active { background: var(--accent); color: white; }
        .nav-link-custom:hover:not(.active) { background: rgba(255,255,255,0.1); color: white; }
        
        .logout-box { margin-top: auto; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        .btn-logout { background: #dc3545; color: white !important; font-weight: bold; text-align: center; }
        
        /* CONTENT AJUSTADO */
        .content { margin-left: 280px; padding: 40px; width: calc(100% - 280px); transition: 0.3s; }
        
        .admin-header-bar { background: white; padding: 15px 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border-left: 8px solid var(--sidebar-color); margin-bottom: 35px; display: flex; justify-content: space-between; align-items: center; }
        .admin-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); margin-bottom: 30px; border-top: 4px solid var(--accent); }
        
        .img-mini { width: 60px; height: 60px; object-fit: cover; border-radius: 10px; }
        .btn-qty { border: none; background: var(--sidebar-color); color: white; width: 28px; height: 28px; border-radius: 50%; font-weight: bold; cursor: pointer; }
        #loadingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: none; justify-content: center; align-items: center; z-index: 9999; }
        
        .chat-list-item { cursor: pointer; border-bottom: 1px solid #eee; padding: 12px; transition: 0.2s; }
        .chat-list-item.active { background: #e9ecef; border-left: 4px solid var(--accent); }
        #admin-chat-box { height: 400px; overflow-y: auto; background: #fafafa; border-radius: 8px; padding: 15px; border: 1px solid #eee; display: flex; flex-direction: column; gap: 10px; }
        
        .preview-container-media { min-height: 150px; border: 1px dashed #ccc; border-radius: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #f9f9f9; position: relative; }
        .preview-container-media img, .preview-container-media video { max-width: 100%; max-height: 150px; object-fit: contain; transition: transform 0.5s ease; }
        .preview-container-media:hover img { transform: scale(1.5); }

        @keyframes blinker { 50% { opacity: 0; } }
        .blink-text { animation: blinker 1s linear infinite; color: #e63946; font-weight: bold; }

        /* --- MEDIA QUERIES PARA CELULAR --- */
        @media (max-width: 991px) {
            .sidebar { width: 80px; padding: 15px 10px; }
            .sidebar h4, .sidebar .nav-link-custom span, .sidebar .nav-link-custom i + span { display: none; }
            .sidebar .nav-link-custom { text-align: center; padding: 15px 0; }
            .sidebar .nav-link-custom i { margin: 0 !important; font-size: 1.4rem; }
            .sidebar-logo { width: 50px; height: 50px; }
            .content { margin-left: 80px; width: calc(100% - 80px); padding: 20px; }
            .admin-header-bar { flex-direction: column; text-align: center; gap: 10px; }
            .badge { right: 5px !important; }
        }

        @media (max-width: 576px) {
            .sidebar { position: fixed; bottom: 0; height: auto; width: 100%; flex-direction: row; border-right: none; border-top: 4px solid var(--accent); padding: 5px; justify-content: space-around; }
            .sidebar-logo, .sidebar h4, .logout-box { display: none; }
            .sidebar .nav-link-custom { margin-bottom: 0; width: auto; padding: 10px; }
            .content { margin-left: 0; width: 100%; padding-bottom: 80px; }
            .admin-card { padding: 15px; }
            .stat-badge { font-size: 1.1rem; }
            .table-responsive { font-size: 0.8rem; }
        }

        #printableReceipt { font-family: 'Poppins', sans-serif; display: none; padding: 30px; border: 2px solid #eee; width: 400px; margin: auto; background: white; }
        .receipt-header { border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-bottom: 15px; text-align: center; }
        .receipt-logo { width: 70px; border-radius: 50%; margin-bottom: 10px; }
        .receipt-title { font-family: 'Cinzel', serif; color: var(--sidebar-color); font-size: 1.2rem; margin: 0; }

        @media print {
            body * { visibility: hidden; }
            #printableReceipt, #printableReceipt * { visibility: visible; }
            #printableReceipt { display: block !important; position: absolute; left: 0; top: 0; width: 100%; border: none; }
        }
    </style>
</head>
<body>

<div id="loadingOverlay"><div class="spinner-border text-primary"></div></div>

<div class="wrapper">
    <nav class="sidebar">
        <img src="images/Logo1.png" alt="Logo" class="sidebar-logo">
        <h4>LA PRIMAVERA</h4>
        <button class="nav-link-custom active" id="btn-flor" onclick="trocarPainel('flor')"><i class="bi bi-flower1"></i> <span>Floristerie</span></button>
        <button class="nav-link-custom" id="btn-deje" onclick="trocarPainel('deje')"><i class="bi bi-basket"></i> <span>Déjeuners</span></button>
        <button class="nav-link-custom" id="btn-patis" onclick="trocarPainel('patis')"><i class="bi bi-cup-hot"></i> <span>Pâtisserie</span></button>
        <button class="nav-link-custom" id="btn-moments" onclick="trocarPainel('moments')"><i class="bi bi-calendar-heart"></i> <span>Moments</span></button>
        <button class="nav-link-custom" id="btn-slots" onclick="trocarPainel('slots')"><i class="bi bi-clock-history"></i> <span>Horaires</span></button>
        <button class="nav-link-custom" id="btn-clients" onclick="trocarPainel('clients')"><i class="bi bi-people-fill"></i> <span>Clients</span></button>
        <button class="nav-link-custom" id="btn-orders" onclick="trocarPainel('orders')">
            <i class="bi bi-receipt"></i> <span>Commandes</span>
            <span id="order-badge-admin" class="badge bg-danger rounded-pill position-absolute" style="display:none; right: 10px; top: 12px; font-size: 0.6rem;">0</span>
        </button>
        <button class="nav-link-custom" id="btn-home" onclick="trocarPainel('home')"><i class="bi bi-house-gear"></i> <span>Home</span></button>
        <button class="nav-link-custom" id="btn-chat" onclick="trocarPainel('chat')">
            <i class="bi bi-chat-dots"></i> <span>Messages</span> 
            <span id="msg-badge-admin" class="badge bg-danger rounded-pill position-absolute" style="display:none; right: 10px; top: 12px; font-size: 0.6rem;">0</span>
        </button>
        
        <div class="logout-box">
            <button onclick="handleLogout()" class="nav-link-custom btn-logout"><i class="bi bi-box-arrow-left"></i> <span>Logout</span></button>
        </div>
    </nav>

    <main class="content">
        <div class="admin-header-bar">
            <div class="quote-box d-none d-md-block"><i class="bi bi-quote"></i> Cultiver la beauté...</div>
            <div class="fw-bold small" style="color:var(--accent);">LA PRIMAVERA ADMIN</div>
            <button class="btn btn-sm btn-outline-dark d-md-none" onclick="handleLogout()"><i class="bi bi-power"></i></button>
        </div>

        <div id="painel-flor">
            <h2 class="mb-4" style="font-family: 'Cinzel';">🌸 Floristerie</h2>
            <div class="admin-card">
                <form id="formFlower" class="row g-3">
                    <div class="col-md-4"><label class="fw-bold small">Nom</label><input type="text" id="f_name" class="form-control" required></div>
                    <div class="col-md-3"><label class="fw-bold small">Moment</label><select id="f_moments_select" class="form-select" required></select></div>
                    <div class="col-md-2"><label class="fw-bold small">Prix ($)</label><input type="number" id="f_price" class="form-control" step="0.01" required></div>
                    <div class="col-md-3"><label class="fw-bold small">Stock</label><input type="number" id="f_stock" class="form-control" value="10"></div>
                    <div class="col-md-2"><label class="fw-bold small text-danger">Remise %</label><input type="number" id="f_init_disc" class="form-control" placeholder="0"></div>
                    <div class="col-md-3"><label class="fw-bold small text-danger">Expire le</label><input type="date" id="f_init_expiry" class="form-control promo-date-input"></div>
                    <div class="col-md-7"><label class="fw-bold small">Image</label><input type="file" id="f_file" class="form-control" accept="image/*" required></div>
                    <div class="col-12"><label class="fw-bold small">Description</label><textarea id="f_desc" class="form-control" rows="2"></textarea></div>
                    <div class="col-12 text-end"><button type="submit" class="btn btn-dark px-5">ENREGISTRER</button></div>
                </form>
            </div>
            <div class="admin-card table-responsive"><table class="table align-middle"><thead><tr><th>Visuel</th><th>Produit</th><th>Moment</th><th>Remise %</th><th>Stock</th><th>Action</th></tr></thead><tbody id="lista-flor"></tbody></table></div>
        </div>

        <div id="painel-deje" style="display:none;">
            <h2 class="mb-4" style="font-family: 'Cinzel';">🍱 Déjeuners</h2>
            <div class="admin-card table-responsive"><table class="table align-middle"><tbody id="lista-deje"></tbody></table></div>
        </div>
        
        <div id="painel-patis" style="display:none;">
            <h2 class="mb-4" style="font-family: 'Cinzel';">🍰 Pâtisserie</h2>
            <div class="admin-card table-responsive"><table class="table align-middle"><tbody id="lista-patis"></tbody></table></div>
        </div>

        <div id="painel-home" style="display:none;">
             <h2 class="mb-4" style="font-family: 'Cinzel';">🖼️ Accueil</h2>
             <div class="admin-card">
                <div class="row g-4">
                    <div class="col-12 border-bottom pb-4 text-center">
                        <label class="fw-bold d-block mb-2">Bannière Principale</label>
                        <input type="file" class="form-control mb-2" onchange="uploadHomeImage('hero_bg', this)">
                        <div id="preview-hero_bg" class="preview-container-media"></div>
                    </div>
                </div>
             </div>
        </div>

        <div id="painel-orders" style="display:none;">
            <h2 class="mb-4" style="font-family: 'Cinzel';">📜 Commandes</h2>
            <div class="admin-card table-responsive">
                <table class="table align-middle" id="ordersTable">
                    <thead><tr><th>Date</th><th>Client</th><th>Total</th><th>Statut</th><th>Action</th></tr></thead>
                    <tbody id="lista-orders"></tbody>
                </table>
            </div>
        </div>

        <div id="painel-chat" style="display:none;">
            <div class="row">
                <div class="col-md-4"><div class="admin-card p-0" id="chat-users-list"></div></div>
                <div class="col-md-8"><div class="admin-card"><div id="admin-chat-box"></div><div class="input-group mt-3"><input type="text" id="admin-reply-input" class="form-control"><button class="btn btn-dark" onclick="sendReply()">Envoyer</button></div></div></div>
            </div>
        </div>

    </main>
</div>

</body>
</html>
